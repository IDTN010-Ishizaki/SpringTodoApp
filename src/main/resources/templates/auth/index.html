<!DOCTYPE html>
<html lang="ja" xmlns:th="http:/www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Document</title>
</head>

<body>
    <div class="login-card">
        <form action="/auth/login" method="post">

            <div th:object="${loginForm}" class="login-form-body">
                <div>
                    <h3 th:class="title">ログイン</h3>
                </div>
                <div>
                    <label th:class="login-text-label" for="id">ユーザーID</label>
                    <input th:class="login-textbox" type="text" th:field="*{id}">
                    <p th:class="err" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></p>
                </div>
                <div>
                    <label th:class="login-text-label" for="password">パスワード</label>
                    <input th:class="login-textbox" type="password" th:field="*{password}">
                    <p th:class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <div>
                    <p class="err" th:text="${msg}"></p>
                </div>
            </div>
            <hr>
            <div>
                <a th:class=" login-register-link" th:href="@{/auth/register}">ユーザーを作成</a>
            </div>
            <div>
                <input th:class="login-btn" type="submit" value="ログイン">
            </div>

        </form>
    </div>

</body>

</html>
