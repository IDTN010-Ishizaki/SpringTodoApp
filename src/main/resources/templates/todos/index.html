<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Todoリスト</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>タスク一覧</h1>
        </header>
        <section>
            <form th:action="@{/todos/register}" th:object="${form}" method="post">
                <table>
                    <tr>
                        <td>タスク名: </td>
                        <td>
                            <input type="text" th:field="*{title}">
                            <p class="err" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                        </td>

                    </tr>
                    <tr>
                        <td>締め切り時刻: </td>
                        <td>
                            <input type="datetime-local" th:field="*{deadline}">
                            <p class="err" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></p>
                        </td>
                    </tr>
                    <tr>
                        <td>優先度:</td>
                        <td>
                            <select name="priority">
                                <option th:value="${priority}" th:each="priority : ${#numbers.sequence(1, 5)}">
                                    <span th:each="star : ${#numbers.sequence(1, priority)}"
                                        th:selected="${star == priority}">★</span>
                                </option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><input type="submit" value="新規作成"></td>
                    </tr>
                </table>
                <div>
                    <p th:text="${msg}"></p>
                </div>
            </form>
        </section>
        <section>
            <form method="get">
                <table>
                    <tr>
                        <th>タスク名</th>
                        <th>締切</th>
                        <th>優先度</th>
                    </tr>
                    <tr th:object="${working}" th:each="working : ${workingTask}">
                        <td th:text="*{title}"></td>
                        <td th:text="*{#temporals.format(deadline, 'yyyy/MM/dd -- HH:mm')}"></td>
                        <td>
                            <span th:each=" i : *{#numbers.sequence(1, priority)}">★</span>
                        </td>
                        <td>
                            <button type="submit" th:if="*{#strings.equals(status, 'IN_PROGRESS')} == false"
                                th:name="taskStatus" th:value="IN_PROGRESS"
                                th:formaction="@{/todos/change-status/} + *{id}">
                                着手
                            </button>
                            <button type="submit" th:if="*{#strings.equals(status, 'IN_PROGRESS')}" th:name="taskStatus"
                                th:value="HOLD" th:formaction="@{/todos/change-status/} + *{id}">
                                中断
                            </button>
                            <button type="submit" th:name="taskStatus" th:value="COMPLETED"
                                th:formaction="@{/todos/change-status/} + *{id}">
                                完了
                            </button>
                            <button type="submit" th:formaction="@{/todos/delete/} + *{id}">削除</button>

                        </td>
                    </tr>
                </table>
            </form>
        </section>
        <section>
            <form method="get">
                <h3>完了済みタスク一覧</h3>
                <table>
                    <tr>
                        <th>完了済みタスク</th>
                        <th>完了日時</th>
                    </tr>
                    <tr th:object="${completed}" th:each="completed : ${completedTask}">
                        <td th:text="*{title}"></td>
                        <td th:text="*{#temporals.format(completedAt, 'yyyy/MM/dd -- HH:mm')} ?: ---"></td>
                        <td>
                            <button type="submit" th:name="taskStatus" th:value="HOLD"
                                th:formaction="@{/todos/change-status/} + *{id}">
                                未完了
                            </button>
                            <button type="submit" th:formaction="@{/todos/delete/} + *{id}">削除</button>
                        </td>
                    </tr>
                </table>
            </form>

        </section>
    </div>
</body>

</html>
